# ── Global defaults — overridden by dataset-specific configs ──────────────────

experiment:
  name: HomeSenseKD_experiment
  results_dir: results
  fig_dir: results/figures
  log_dir: logs
  seeds: [42, 123, 456]          # three seeds → mean ± std confidence intervals

data:
  dataset: home_occupancy        # home_occupancy | home_har | mnist | cifar10
  public_dataset: home_har       # dataset used as unlabelled public pool for KD
  n_classes: 3
  n_parties: 20
  n_samples_per_class: 30        # IID samples drawn per class per client
  dirichlet_alpha: 0.5           # Dirichlet concentration (lower = more heterogeneous)
  window_size: 1500               # CSI-only: sliding-window length
  n_stft_bins: 8                 # CSI-only: STFT bins retained; n_features = 4 + n_stft_bins
  settings:
    - iid
    - noniid

federated:
  n_rounds: 50
  local_epochs: 4
  kd_epochs: 2
  fedprox_mu: 0.01
  n_alignment: 10000             # public samples used for KD alignment

models:
  heterogeneity: uniform         # all_small | uniform | skewed
  # fractional breakdown [small, medium, large] per heterogeneity mode
  distributions:
    all_small: [1.00, 0.00, 0.00]
    uniform:   [0.35, 0.35, 0.30]
    skewed:    [0.60, 0.30, 0.10]

algorithms:
  - fedmd
  - fedakd
  - mks
  - fedavg
  - fedprox
  - local
  - central
